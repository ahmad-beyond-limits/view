<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Ahmad | Analytics Engineer</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #050505;
            --text-muted: rgba(5, 5, 5, 0.6);
            --text-faint: rgba(5, 5, 5, 0.05);
            --text-faint-hover: rgba(5, 5, 5, 0.1);
            --border-color: rgba(5, 5, 5, 0.1);
            --border-faint: rgba(5, 5, 5, 0.05);
            --accent: #0812F9;
            --accent-soft: rgba(8, 18, 249, 0.05);
        }

        .dark {
            --bg-color: #050505;
            --text-color: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.5);
            --text-faint: rgba(255, 255, 255, 0.05);
            --text-faint-hover: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.1);
            --border-faint: rgba(255, 255, 255, 0.05);
            --accent: #FF5C00;
            --accent-soft: rgba(255, 92, 0, 0.05);
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            scroll-behavior: smooth;
            overflow-x: hidden;
            width: 100%;
            transition: background-color 0.3s, color 0.3s;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
