backend:
  name: github
  repo: ahmad-beyond-limits/view
  branch: main
  base_url: https://sveltia-cms-auth.ahmad-bsds.workers.dev
  # For local testing, we can use local_backend: true, but Sveltia handles Github OAuth gracefully
  # Sveltia has a built-in OAuth proxy so no extra server is needed!

media_folder: "public/images"
public_folder: "/images"

# Enable local testing backend if you run 'npx decap-server' (Sveltia supports this too)
local_backend: true

collections:
  - name: "projects"
    label: "Portfolio Projects"
    folder: "content/projects"
    create: true
    format: "json"
    extension: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "ID", name: "id", widget: "string", required: false}
      - {label: "Title", name: "title", widget: "string"}
      - {
          label: "Category", 
          name: "category", 
          widget: "select", 
          options: ["Data Science & Analytics", "Design Works", "Development Work"]
        }
      - {label: "Type (e.g. Visual Identity)", name: "type", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Main Image", name: "image", widget: "image"}
      - {
          label: "Gallery Images", 
          name: "images", 
          widget: "list", 
          field: {name: "image", widget: "image"}, 
          required: false
        }
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "GitHub Link", name: "githubLink", widget: "string", required: false}
      - {label: "External Link", name: "link", widget: "string", required: false}
      - {label: "Is Clickable / Open Modal?", name: "clickable", widget: "boolean", default: true, required: false}
      - {label: "Figma Link", name: "figmaLink", widget: "string", required: false}
  - name: "articles"
    label: "Thinking Out Loud (Articles)"
    folder: "content/articles"
    create: true
    format: "json"
    extension: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "ID", name: "id", widget: "string", required: false}
      - {label: "Order", name: "order", widget: "number", default: 0, required: false}
      - {label: "Title", name: "title", widget: "string"}
      - {
          label: "Category", 
          name: "category", 
          widget: "select", 
          options: ["Strategy", "Design", "Analytics", "Engineering", "Business"]
        }
      - {label: "Main Image", name: "image", widget: "image", required: false}
      - {label: "Excerpt", name: "excerpt", widget: "text"}
      - {label: "Date", name: "date", widget: "string", hint: "e.g., May 2024"}
      - {label: "Read Time", name: "readTime", widget: "string", hint: "e.g., 8 min read"}
      - {label: "External Link", name: "link", widget: "string", required: false}
  - name: "headers"
    label: "Section Headers"
    folder: "content/headers"
    create: true
    format: "json"
    extension: "json"
    fields:
      - {label: "Section ID", name: "sectionId", widget: "string"}
      - {label: "Overline", name: "overline", widget: "string"}
      - {label: "Title Part 1", name: "titlePart1", widget: "string"}
      - {label: "Title Part 2", name: "titlePart2", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
  - name: "experience"
    label: "Experience"
    folder: "content/experience"
    create: true
    format: "json"
    extension: "json"
    fields:
      - {label: "Company", name: "company", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Period", name: "period", widget: "string"}
      - {label: "Description", name: "description", widget: "list"}
      - {label: "Order", name: "order", widget: "number", default: 0}
  - name: "research"
    label: "Research"
    folder: "content/research"
    create: true
    format: "json"
    extension: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Status", name: "status", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Order", name: "order", widget: "number", default: 0}
  - name: "certifications"
    label: "Certifications"
    folder: "content/certifications"
    create: true
    format: "json"
    extension: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Issuer", name: "issuer", widget: "string"}
      - {label: "Tags", name: "tags", widget: "list"}
      - {label: "Order", name: "order", widget: "number", default: 0}
  - name: "education"
    label: "Education"
    folder: "content/education"
    create: true
    format: "json"
    extension: "json"
    fields:
      - {label: "School", name: "school", widget: "string"}
      - {label: "Degree", name: "degree", widget: "string"}
      - {label: "Location", name: "location", widget: "string"}
      - {label: "Period", name: "period", widget: "string"}
      - {label: "Concentrations", name: "concentrations", widget: "string"}
      - {label: "Coursework", name: "coursework", widget: "text"}
      - {label: "Order", name: "order", widget: "number", default: 0}
  - name: "achievements"
    label: "Achievements"
    folder: "content/achievements"
    create: true
    format: "json"
    extension: "json"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Organization", name: "organization", widget: "string"}
      - {label: "Date", name: "date", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Order", name: "order", widget: "number", default: 0}
